<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Outfit</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family: 'Segoe UI',sans-serif;
  background:#0a0a0a;
  color:#fff;
}

.header{
  background:rgba(10,10,10,.8);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 40px;
  border-bottom:1px solid #222;
  z-index:100;
}

.logo{
  font-size:24px;
  font-weight:800;
  letter-spacing:3px;
}

.logo span{color:#d4af37}

.nav a{
  margin-left:20px;
  text-decoration:none;
  color:#aaa;
  font-size:14px;
}

.nav a:hover{color:#fff}

.hero{
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  min-height:90vh;
  padding:60px 40px;
  gap:40px;
}

.hero-text h1{
  font-size:60px;
  line-height:1.1;
}

.hero-text span{
  color:#d4af37;
}

.hero-text p{
  margin:20px 0;
  color:#bbb;
  max-width:400px;
}

.btn{
  display:inline-block;
  padding:12px 25px;
  border-radius:30px;
  border:1px solid #d4af37;
  color:#d4af37;
  text-decoration:none;
}

.btn:hover{
  background:#d4af37;
  color:#000;
}

.hero-img{
  height:500px;
  border-radius:20px;
  background:
    linear-gradient(rgba(0,0,0,.3),rgba(0,0,0,.6)),
    url("Logo Toko.png") center/cover;
}

/* SECTION */
.container{
  padding:60px 40px;
}

.title{
  text-align:center;
  margin-bottom:40px;
}

.title span{color:#d4af37}

/* SEARCH */
.search{
  display:flex;
  justify-content:center;
  margin-bottom:30px;
}

.search input{
  width:300px;
  padding:12px;
  border-radius:30px;
  border:1px solid #333;
  background:#111;
  color:#fff;
}

/* PRODUCTS */
.products{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:25px;
}

.card{
  background:#111;
  border-radius:15px;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:translateY(-6px);
}

.card img{
  width:100%;
  height:300px;
  object-fit:cover;
}

.content{
  padding:15px;
}

.brand{
  font-size:12px;
  color:#aaa;
}

.name{
  font-size:18px;
  margin:5px 0;
}

.price{
  color:#d4af37;
  font-weight:bold;
  margin-bottom:10px;
}

/* SIZE */
.sizes{
  display:flex;
  gap:8px;
  margin-bottom:15px;
}

.size{
  padding:5px 10px;
  border-radius:20px;
  border:1px solid #333;
  font-size:12px;
  cursor:pointer;
}

.size.ready{
  border-color:#22c55e;
  color:#22c55e;
}

.size.sold{
  border-color:#ef4444;
  color:#ef4444;
}

/* BUTTON */
.order{
  display:block;
  text-align:center;
  padding:10px;
  border-radius:30px;
  border:1px solid #d4af37;
  color:#d4af37;
  text-decoration:none;
}

.order:hover{
  background:#d4af37;
  color:#000;
}

/* FOOTER */
.footer{
  text-align:center;
  padding:30px;
  border-top:1px solid #222;
  color:#777;
}

@media(max-width:800px){
  .hero{grid-template-columns:1fr}
}

.hero-img{
  position:relative;
}

.hero-img::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to right, rgba(0,0,0,.4), rgba(0,0,0,.1));
}

.hero-text h1{
  font-size:72px;
  letter-spacing:2px;
}

.btn{
  border:1px solid #d4af37;
  color:#d4af37;
  background:transparent;
  transition:.3s;
}

.btn:hover{
  background:#d4af37;
  color:#000;
  box-shadow:0 0 20px rgba(212,175,55,.4);
}

.sub{
  color:#aaa;
  letter-spacing:3px;
  font-size:12px;
  margin-bottom:10px;
}

.hero{
  margin-bottom:80px;
}

/* ===== TEXT BERJALAN ===== */
.top-bar{
  background:#000;
  overflow:hidden;
  white-space:nowrap;
  border-bottom:1px solid #222;
}

.top-bar span{
  display:inline-block;
  padding-left:100%;
  animation:marquee 25s linear infinite;
  color:#d4af37;
  font-size:12px;
  letter-spacing:3px;
}

@keyframes marquee{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.header{
  background:rgba(10,10,10,.8);
  backdrop-filter:blur(10px);
  display:flex;
  align-items:center;
  justify-content:flex-end; /* ubah ini */
  padding:18px 40px;
  border-bottom:1px solid #222;
  z-index:100;
}

.logo{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  font-size:24px;
  font-weight:800;
  letter-spacing:5px;
}

</style>
</head>

<body>

<div class="top-bar">
  <span>
    ● 100% ORIGINAL ● FAST RESPONSE ● QUALITY PREMIUM ● PRIME OUTFIT COLLECTION ● STYLE YOUR IDENTITY ●
  </span>
</div>

<header class="header">
  <div class="logo">PRIME <span>OUTFIT</span></div>
  <div class="nav">
    <a href="#"></a>
    <a href="#produk"></a>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>STYLE YOUR <span>IDENTITY</span></h1>
    <p>Tampil clean, simple, dan elegant dengan koleksi pilihan terbaik.</p>
    <a href="#produk" class="btn">Explore</a>
  </div>
  <div class="hero-img"></div>
</section>

<section class="container" id="produk">
  <div class="title">
    <h2><span>Collection</span></h2>
  </div>

  <div class="search">
    <input type="text" id="search" placeholder="Cari produk...">
  </div>

  <div class="products" id="list"></div>
</section>

<footer class="footer">
  © 2026 Prime Outfit
</footer>

<script>
const telegram = "usernamekamu";

const products = [
{
brand:"Lacoste",
name:"Polo White",
price:"THB 1.200",
sizes:[
{name:"M",stock:true},
{name:"L",stock:true},
{name:"XL",stock:false}
],
img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab"
},
{
brand:"Lacoste",
name:"Polo Black",
price:"THB 2.000",
sizes:[
{name:"M",stock:true},
{name:"L",stock:false},
{name:"XL",stock:false}
],
img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f"
},
{
brand:"Fred Perry",
name:"Twin Tipped Shirt",
price:"THB 2.500",
sizes:[
{name:"S",stock:true},
{name:"M",stock:true},
{name:"L",stock:true}
],
img:"https://images.unsplash.com/photo-1503342217505-b0a15ec3261c"
}
];

const list = document.getElementById("list");
const search = document.getElementById("search");

function render(){
const key = search.value.toLowerCase();

list.innerHTML = products.filter(p=>{
return p.name.toLowerCase().includes(key);
}).map(p=>`
<div class="card">
<img src="${p.img}">
<div class="content">
<div class="brand">${p.brand}</div>
<div class="name">${p.name}</div>
<div class="price">${p.price}</div>

<div class="sizes">
${p.sizes.map(s=>`
<div class="size ${s.stock ? 'ready':'sold'}">
${s.name}
</div>
`).join("")}
</div>

<a class="order" href="https://t.me/${telegram}?text=Order ${p.name}" target="_blank">
Order via Telegram
</a>

</div>
</div>
`).join("");
}

search.addEventListener("input",render);
render();
</script>

</body>
</html>
