<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Outfit</title>
  <meta name="robots" content="noindex" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #111827, #1f2937);
      padding: 28px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header h1 {
      font-size: 34px;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .header p {
      color: #cbd5e1;
      font-size: 15px;
    }

    .topbar {
      padding: 16px 20px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .brand-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .brand-btn {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .brand-btn:hover,
    .brand-btn.active {
      background: #22c55e;
      color: #08110d;
      font-weight: bold;
    }

    .search-box input {
      width: 260px;
      max-width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: #1e293b;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 20px 40px;
    }

    .section-title {
      margin: 18px 0 20px;
      font-size: 24px;
      color: #f8fafc;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 22px;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 35px rgba(0,0,0,0.35);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      background: #0f172a;
    }

    .card-content {
      padding: 16px;
    }

    .brand-tag {
      display: inline-block;
      background: rgba(34,197,94,0.15);
      color: #86efac;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .product-name {
      font-size: 20px;
      margin-bottom: 10px;
      color: #fff;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 8px;
    }

    .info {
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 14px;
    }

    .stock {
      margin-bottom: 14px;
      font-size: 14px;
      font-weight: bold;
    }

    .stock.ready {
      color: #4ade80;
    }

    .stock.low {
      color: #facc15;
    }

    .stock.empty {
      color: #f87171;
    }

    .telegram-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #22c55e;
      color: #08110d;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s ease;
    }

    .telegram-btn:hover {
      background: #16a34a;
      color: #fff;
    }

    .footer {
      text-align: center;
      color: #94a3b8;
      padding: 30px 20px 50px;
      font-size: 14px;
    }

    .note-box {
      max-width: 1200px;
      margin: 10px auto 0;
      padding: 0 20px 10px;
    }

    .note {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box input {
        width: 100%;
      }

      .header h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Prime Outfit</h1>
    <p>Collection premium outfit pilihan — simple, trendy, elegant.</p>
  </div>

  <div class="topbar">
    <div class="brand-filter" id="brandFilter"></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari baju, brand, size..." />
    </div>
  </div>

  <div class="note-box">
    <div class="note">
      Klik brand untuk filter produk. Klik tombol Telegram untuk order.
      Customer hanya bisa melihat produk, tidak bisa mengubah isi website.
    </div>
  </div>

  <div class="container">
    <h2 class="section-title">Daftar Produk</h2>
    <div class="products" id="productList"></div>
  </div>

  <div class="footer">
    © 2026 Prime Outfit — Order via Telegram
  </div>

  <script>
    // =========================
    // GANTI USERNAME TELEGRAM DI SINI
    // contoh: const telegramUsername = "namatelegramkamu";
    // TANPA @
    // =========================
    const telegramUsername = "usernamekamu";

    // =========================
    // DATA PRODUK
    // KAMU BISA EDIT BAGIAN INI NANTI
    // =========================
    const products = [
      {
        brand: "Lacoste",
        name: "Polo Lacoste White",
        price: "Rp450.000",
        size: "M, L, XL",
        stock: 8,
        image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Lacoste",
        name: "Polo Lacoste Black",
        price: "Rp470.000",
        size: "M, L, XL",
        stock: 3,
        image: "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Fred Perry",
        name: "Fred Perry Twin Tipped Shirt",
        price: "Rp520.000",
        size: "S, M, L",
        stock: 5,
        image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Fred Perry",
        name: "Fred Perry Black Polo",
        price: "Rp500.000",
        size: "M, L, XL",
        stock: 0,
        image: "https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Burberry",
        name: "Burberry Beige Tee",
        price: "Rp600.000",
        size: "M, L",
        stock: 2,
        image: "https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Ralph Lauren",
        name: "Ralph Lauren Navy Polo",
        price: "Rp550.000",
        size: "S, M, L, XL",
        stock: 6,
        image: "https://images.unsplash.com/photo-1523381210434-271e8be1f52b?auto=format&fit=crop&w=900&q=80"
      }
    ];

    let activeBrand = "Semua";

    const productList = document.getElementById("productList");
    const brandFilter = document.getElementById("brandFilter");
    const searchInput = document.getElementById("searchInput");

    function getStockClass(stock) {
      if (stock === 0) return "empty";
      if (stock <= 3) return "low";
      return "ready";
    }

    function getStockText(stock) {
      if (stock === 0) return "Stok habis";
      return "Stok: " + stock;
    }

    function telegramLink(product) {
      const text = `Halo kak, saya mau order:%0A%0ABrand: ${product.brand}%0ANama: ${product.name}%0AHarga: ${product.price}%0ASize: ${product.size}`;
      return `https://t.me/${telegramUsername}?text=${text}`;
    }

    function renderBrands() {
      const brands = ["Semua", ...new Set(products.map(p => p.brand))];

      brandFilter.innerHTML = brands.map(brand => `
        <button class="brand-btn ${brand === activeBrand ? 'active' : ''}" onclick="setBrand('${brand}')">
          ${brand}
        </button>
      `).join("");
    }

    function renderProducts() {
      const keyword = searchInput.value.toLowerCase();

      const filtered = products.filter(product => {
        const matchBrand = activeBrand === "Semua" || product.brand === activeBrand;
        const text = `${product.brand} ${product.name} ${product.size} ${product.price}`.toLowerCase();
        const matchSearch = text.includes(keyword);
        return matchBrand && matchSearch;
      });

      if (filtered.length === 0) {
        productList.innerHTML = `
          <div style="grid-column: 1/-1; background:#111827; padding:30px; border-radius:20px; text-align:center; color:#cbd5e1;">
            Produk tidak ditemukan.
          </div>
        `;
        return;
      }

      productList.innerHTML = filtered.map(product => `
        <div class="card">
          <img src="${product.image}" alt="${product.name}">
          <div class="card-content">
            <span class="brand-tag">${product.brand}</span>
            <h3 class="product-name">${product.name}</h3>
            <div class="price">${product.price}</div>
            <div class="info">
              <div><strong>Size:</strong> ${product.size}</div>
            </div>
            <div class="stock ${getStockClass(product.stock)}">${getStockText(product.stock)}</div>
            ${product.stock === 0
              ? `<a class="telegram-btn" href="${telegramLink(product)}" target="_blank">Tanya via Telegram</a>`
              : `<a class="telegram-btn" href="${telegramLink(product)}" target="_blank">Order via Telegram</a>`
            }
          </div>
        </div>
      `).join("");
    }

    function setBrand(brand) {
      activeBrand = brand;
      renderBrands();
      renderProducts();
    }

    searchInput.addEventListener("input", renderProducts);

    renderBrands();
    renderProducts();
  </script>
</body>
</html>
