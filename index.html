<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prime Outfit</title>
  <meta name="robots" content="noindex" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #fff;
    }

    .header {
      background: linear-gradient(135deg, #111827, #1f2937);
      padding: 28px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .header h1 {
      font-size: 34px;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .header p {
      color: #cbd5e1;
      font-size: 15px;
    }

    .topbar {
      padding: 16px 20px;
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
    }

    .brand-filter {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .brand-btn {
      background: #1e293b;
      color: #e2e8f0;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
      transition: 0.2s ease;
      font-size: 14px;
    }

    .brand-btn:hover,
    .brand-btn.active {
      background: #22c55e;
      color: #08110d;
      font-weight: bold;
    }

    .search-box input {
      width: 260px;
      max-width: 100%;
      padding: 12px 14px;
      border-radius: 12px;
      border: none;
      outline: none;
      background: #1e293b;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 20px 40px;
    }

    .section-title {
      margin: 18px 0 20px;
      font-size: 24px;
      color: #f8fafc;
    }

    .products {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 22px;
      align-items: stretch;
    }

    .card {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.25);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 35px rgba(0,0,0,0.35);
    }

    .card img {
      width: 100%;
      height: 280px;
      object-fit: cover;
      display: block;
      background: #0f172a;
    }

    .card-content {
      padding: 16px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }

    .brand-tag {
      display: inline-block;
      background: rgba(34,197,94,0.15);
      color: #86efac;
      font-size: 12px;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      width: fit-content;
    }

    .product-name {
      font-size: 20px;
      margin-bottom: 10px;
      color: #fff;
      min-height: 56px;
      line-height: 1.25;
    }

    .price {
      font-size: 18px;
      font-weight: bold;
      color: #facc15;
      margin-bottom: 12px;
    }

    .info-label {
      color: #cbd5e1;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .size-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 18px;
    }

    .size-badge {
      padding: 6px 10px;
      border-radius: 999px;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 13px;
      border: 1px solid rgba(255,255,255,0.08);
    }

    .size-badge.soldout {
      background: rgba(248,113,113,0.15);
      color: #f87171;
      border-color: rgba(248,113,113,0.35);
    }

    .telegram-btn {
      display: inline-block;
      width: 100%;
      text-align: center;
      text-decoration: none;
      background: #22c55e;
      color: #08110d;
      padding: 12px 14px;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s ease;
      margin-top: auto;
    }

    .telegram-btn:hover {
      background: #16a34a;
      color: #fff;
    }

    .footer {
      text-align: center;
      color: #94a3b8;
      padding: 30px 20px 50px;
      font-size: 14px;
    }

    .note-box {
      max-width: 1200px;
      margin: 10px auto 0;
      padding: 0 20px 10px;
    }

    .note {
      background: #111827;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px;
      color: #cbd5e1;
      font-size: 14px;
      line-height: 1.7;
    }

    .empty-state {
      grid-column: 1 / -1;
      background: #111827;
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      color: #cbd5e1;
      border: 1px solid rgba(255,255,255,0.08);
    }

    @media (max-width: 640px) {
      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .search-box input {
        width: 100%;
      }

      .header h1 {
        font-size: 28px;
      }

      .product-name {
        min-height: auto;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Prime Outfit</h1>
    <p>Collection premium outfit pilihan — simple, trendy, elegant.</p>
  </div>

  <div class="topbar">
    <div class="brand-filter" id="brandFilter"></div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Cari baju, brand, ukuran..." />
    </div>
  </div>

  <div class="note-box">
    <div class="note">
      Klik brand untuk filter produk. Klik tombol Telegram untuk order.
      Customer hanya bisa melihat produk, tidak bisa mengubah isi website.
    </div>
  </div>

  <div class="container">
    <h2 class="section-title">Daftar Produk</h2>
    <div class="products" id="productList"></div>
  </div>

  <div class="footer">
    © 2026 Prime Outfit — Order via Telegram
  </div>

  <script>
    const telegramUsername = "usernamekamu";

    const products = [
      {
        brand: "Lacoste",
        name: "Polo Lacoste White",
        price: "Rp450.000",
        stock: 8,
        sizes: [
          { name: "M", soldOut: false },
          { name: "L", soldOut: false },
          { name: "XL", soldOut: false }
        ],
        image: "https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Lacoste",
        name: "Polo Lacoste Black",
        price: "Rp470.000",
        stock: 3,
        sizes: [
          { name: "M", soldOut: false },
          { name: "L", soldOut: true },
          { name: "XL", soldOut: false }
        ],
        image: "https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Fred Perry",
        name: "Fred Perry Twin Tipped Shirt",
        price: "Rp520.000",
        stock: 5,
        sizes: [
          { name: "S", soldOut: false },
          { name: "M", soldOut: false },
          { name: "L", soldOut: false }
        ],
        image: "https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=900&q=80"
      },
      {
        brand: "Fred Perry",
        name: "Fred Perry Black Polo",
        price: "Rp500.000",
        stock: 0,
        sizes: [
          { name: "M", soldOut: true },
          { name: "L", soldOut: true },
          { name: "XL", soldOut: true }
        ],
        image: "https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=900&q=80"
      }
    ];

    function normalizeProducts() {
      products.forEach(product => {
        if (product.stock === 0) {
          product.sizes = product.sizes.map(size => ({
            ...size,
            soldOut: true
          }));
        }
      });
    }

    normalizeProducts();

    let activeBrand = "Semua";

    const productList = document.getElementById("productList");
    const brandFilter = document.getElementById("brandFilter");
    const searchInput = document.getElementById("searchInput");

    function telegramLink(product) {
      const availableSizes = product.sizes
        .filter(size => !size.soldOut)
        .map(size => size.name)
        .join(", ");

      const text =
        `Halo kak, saya mau order:%0A%0A` +
        `Brand: ${product.brand}%0A` +
        `Nama: ${product.name}%0A` +
        `Harga: ${product.price}%0A` +
        `Ukuran tersedia: ${availableSizes || "Silakan tanya admin"}`;

      return `https://t.me/${telegramUsername}?text=${text}`;
    }

    function renderBrands() {
      const brands = ["Semua", ...new Set(products.map(p => p.brand))];

      brandFilter.innerHTML = brands.map(brand => `
        <button class="brand-btn ${brand === activeBrand ? "active" : ""}" onclick="setBrand('${brand}')">
          ${brand}
        </button>
      `).join("");
    }

    function renderProducts() {
      const keyword = searchInput.value.toLowerCase();

      const filtered = products.filter(product => {
        const matchBrand = activeBrand === "Semua" || product.brand === activeBrand;

        const searchableText = [
          product.brand,
          product.name,
          product.price,
          ...product.sizes.map(size => size.name)
        ].join(" ").toLowerCase();

        const matchSearch = searchableText.includes(keyword);

        return matchBrand && matchSearch;
      });

      if (filtered.length === 0) {
        productList.innerHTML = `
          <div class="empty-state">
            Produk tidak ditemukan.
          </div>
        `;
        return;
      }

      productList.innerHTML = filtered.map(product => `
        <div class="card">
          <img src="${product.image}" alt="${product.name}">
          <div class="card-content">
            <span class="brand-tag">${product.brand}</span>
            <h3 class="product-name">${product.name}</h3>
            <div class="price">${product.price}</div>

            <div class="info-label"><strong>Ukuran:</strong></div>
            <div class="size-list">
              ${product.sizes.map(size => `
                <span class="size-badge ${size.soldOut ? "soldout" : ""}">
                  ${size.name}${size.soldOut ? " - Sold Out" : ""}
                </span>
              `).join("")}
            </div>

            <a class="telegram-btn" href="${telegramLink(product)}" target="_blank">
              Order via Telegram
            </a>
          </div>
        </div>
      `).join("");
    }

    function setBrand(brand) {
      activeBrand = brand;
      renderBrands();
      renderProducts();
    }

    searchInput.addEventListener("input", renderProducts);

    renderBrands();
    renderProducts();
  </script>
</body>
</html>
